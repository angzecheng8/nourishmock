<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop - Nourish</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css" />
    <style>
      .shop-header {
        padding: 150px 2rem 4rem 2rem;
        text-align: center;
        background-color: var(--color-lemon-chiffon);
      }
      .shop-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 2rem;
        padding: 4rem 2rem;
        max-width: 1200px;
        margin: 0 auto;
      }
      .product-card {
        background: var(--color-white);
        border-radius: var(--radius-md);
        padding: 1.5rem;
        text-align: center;
        transition: var(--transition-smooth);
        box-shadow: var(--shadow-subtle);
      }
      .product-card:hover {
        transform: translateY(-5px);
        box-shadow: var(--shadow-hover);
      }
      .product-image {
        width: 100%;
        height: 200px;
        background-color: var(--color-cloud);
        border-radius: var(--radius-sm);
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        color: #999;
      }
      .product-title {
        font-size: 1.25rem;
        margin-bottom: 0.5rem;
      }
      .product-price {
        font-weight: 700;
        color: var(--color-fulvous);
        font-size: 1.2rem;
        margin-bottom: 1rem;
      }
      .product-sizes {
        display: flex;
        justify-content: center;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }
      .size-pill {
        padding: 0.25rem 0.5rem;
        border: 1px solid var(--color-eerie-black);
        border-radius: 20px;
        font-size: 0.8rem;
      }
      .external-links {
        display: flex;
        gap: 0.5rem;
        margin-top: 1rem;
        justify-content: center;
      }
      .ext-btn {
        padding: 0.5rem;
        border: 1px solid #ccc;
        border-radius: var(--radius-sm);
        font-size: 0.8rem;
      }
      .ext-btn.shopee { border-color: #f53d2d; color: #f53d2d; }
      .ext-btn.lazada { border-color: #000080; color: #000080; }
    </style>
  </head>
  <body>
    <!-- Top Banner -->
    <div class="top-banner">
      Humanization. Sustainability. Premiumization.
    </div>
    
    <!-- Navigation -->
    <nav class="navbar">
      <div class="nav-container">
        <a href="/" class="logo-wrapper">
          <div style="background: var(--color-primary); width: 40px; height: 50px; border-radius: 50px 50px 0 50px; position:relative; display:flex; justify-content:center; align-items:flex-end; padding-bottom:5px;">
            <div style="background: white; width: 25px; height: 25px; border-radius: 50%; display:flex; justify-content:center; align-items:center;">
               <div style="background: var(--color-primary); width: 5px; height: 5px; border-radius: 50%;"></div>
            </div>
          </div>
          <div class="text-logo">
            <div class="logo-top">PET UNIVERSE</div>
            <div class="logo-main">NO<span class="logo-u">U</span>RISH</div>
            <div class="logo-sub">Humanising Pet Nutrition</div>
          </div>
        </a>

        <div class="nav-links">
          <a href="/shop.html">For Dogs</a>
          <a href="/shop.html">For Cats</a>
          <a href="/product.html">Why Nourish</a>
          <a href="/quiz.html" class="text-accent">Take Test</a>
        </div>

        <div class="nav-actions">
          <div class="search-bar">🔍 Search</div>
          <div class="lang" style="font-weight: 600;">🌐 EN ⌄</div>
        </div>
      </div>
    </nav>
    <div class="sub-navbar">
      Find the perfect food for your pet. <a href="/quiz.html" class="badge-btn">Take the test</a>
    </div>

    <!-- Shop Header -->
    <header class="shop-header">
      <h1 class="section-title">Nourish Your Pet</h1>
      <p class="hero-subtitle">Premium, vet-formulated food for every stage of life.</p>
    </header>

    <!-- Product Grid -->
    <main class="shop-grid" id="productGrid">
      <!-- Products will be generated by JS -->
    </main>

    <script type="module">
      import '/style.css';
      
      const products = [
        { name: "Premium Salmon & Sweet Potato", price: "RM 85.00", type: "Dog" },
        { name: "Grain-Free Chicken Recipe", price: "RM 75.00", type: "Cat" },
        { name: "Senior Care Turkey Blend", price: "RM 90.00", type: "Dog" },
        { name: "Kitten Ocean Fish Formula", price: "RM 80.00", type: "Cat" },
        { name: "Weight Management Beef", price: "RM 95.00", type: "Dog" },
        { name: "Sensitive Stomach Lamb", price: "RM 88.00", type: "Cat" },
      ];

      const grid = document.getElementById('productGrid');
      
      products.forEach(p => {
        grid.innerHTML += `
          <div class="product-card">
            <a href="/product.html">
              <div class="product-image">[ Product Image ]</div>
              <h3 class="product-title">${p.name}</h3>
              <div class="product-price">${p.price}</div>
              <div class="product-sizes">
                <span class="size-pill">2kg</span>
                <span class="size-pill">5kg</span>
                <span class="size-pill">10kg</span>
              </div>
            </a>
            <button class="btn btn-primary" style="width: 100%; padding: 0.75rem;">Add to Cart</button>
            <div class="external-links">
              <a href="#" class="ext-btn shopee">Shopee</a>
              <a href="#" class="ext-btn lazada">Lazada</a>
            </div>
          </div>
        `;
      });
    </script>
  </body>
</html>
